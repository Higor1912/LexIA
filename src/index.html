<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexIA - Assistente Jurídico</title>
    <link rel="icon" type="image/x-icon" href="/assets/lexia_logo.ico">
    <link href="./css/output.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-base-200">
    <header class="navbar bg-base-100 shadow-lg">
        <div class="flex-1 justify-center">
            <h1 class="text-2xl font-bold px-4">LexIA</h1>
        </div>
    </header>

    <div class="container mx-auto p-4 flex flex-col min-h-[calc(100vh-4rem)]">
        <!-- Área de chat -->
        <div class="flex-1 overflow-y-auto mb-48">
            <div class="chat-area">
                <!-- Área para mensagens do chat -->
            </div>
        </div>

        <!-- Área fixa inferior -->
        <div class="fixed bottom-0 left-0 right-0 bg-base-100">
            <div class="container mx-auto max-w-3xl p-4">
                <!-- Cards de sugestão -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <!-- Card 1 -->
                    <div class="card bg-base-200 shadow hover:shadow-lg transition-all cursor-pointer">
                        <div class="card-body p-3">
                            <div class="flex items-center gap-2">
                                <span class="text-2xl">⚖️</span>
                                <h3 class="card-title text-sm">Dúvidas Trabalhistas</h3>
                            </div>
                            <p class="text-xs text-base-content/70">Tire suas dúvidas sobre direitos trabalhistas</p>
                        </div>
                    </div>

                    <!-- Card 2 -->
                    <div class="card bg-base-200 shadow hover:shadow-lg transition-all cursor-pointer">
                        <div class="card-body p-3">
                            <div class="flex items-center gap-2">
                                <span class="text-2xl">📋</span>
                                <h3 class="card-title text-sm">Contratos</h3>
                            </div>
                            <p class="text-xs text-base-content/70">Informações sobre contratos e documentos legais</p>
                        </div>
                    </div>

                    <!-- Card 3 -->
                    <div class="card bg-base-200 shadow hover:shadow-lg transition-all cursor-pointer">
                        <div class="card-body p-3">
                            <div class="flex items-center gap-2">
                                <span class="text-2xl">👥</span>
                                <h3 class="card-title text-sm">Direito Civil</h3>
                            </div>
                            <p class="text-xs text-base-content/70">Esclarecimentos sobre direito civil</p>
                        </div>
                    </div>
                </div>

                <!-- Input e botão -->
                <div class="flex gap-2 border-t pt-4">
                    <input 
                        type="text" 
                        id="messageInput"
                        placeholder="Digite sua mensagem..." 
                        class="input input-bordered flex-1" 
                    />
                    <button 
                        id="sendButton" 
                        class="btn btn-primary"
                    >
                        Enviar
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
