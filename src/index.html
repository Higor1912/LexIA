<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexIA - Assistente Jurídico</title>
    <link rel="icon" type="image/x-icon" href="/assets/lexia_logo.ico">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header class="header">
        <h1>LexIA</h1>
    </header>
    <div class="chat-container">
        <div class="suggestion-cards">
            <div class="card">
                <span class="card-icon">⚖️</span>
                <div class="card-content">
                    <h3>Dúvidas Trabalhistas</h3>
                    <p>Tire suas dúvidas sobre direitos trabalhistas</p>
                </div>
            </div>
            <div class="card">
                <span class="card-icon">📋</span>
                <div class="card-content">
                    <h3>Contratos</h3>
                    <p>Informações sobre contratos e documentos legais</p>
                </div>
            </div>
            <div class="card">
                <span class="card-icon">👥</span>
                <div class="card-content">
                    <h3>Direito Civil</h3>
                    <p>Esclarecimentos sobre direito civil</p>
                </div>
            </div>
        </div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Digite sua mensagem...">
            <button id="sendButton">Enviar</button>
        </div>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
