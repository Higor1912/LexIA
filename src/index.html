<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=width=device-width, initial-scale=1.0">
    <title>LexIA - Assistente Jurídico</title>
    <link rel="icon" type="image/x-icon" href="/assets/lexia_logo.ico">
    <link href="./css/output.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-custom-lightest">
    <header class="navbar bg-custom-dark shadow-lg">
        <div class="flex-1 justify-center">
            <h1 class="text-2xl font-bold px-4 text-white">LexIA</h1>
        </div>
    </header>

    <div class="container mx-auto p-4 flex flex-col min-h-[calc(100vh-4rem)]">
        <!-- Área de resposta movida para cima -->
        <div class="flex-grow mb-4">
            <div id="output-response" 
                 class="p-4 bg-gray-50 rounded-lg min-h-[200px] shadow-sm">
            </div>
        </div>

        <!-- Input e botão fixos na parte inferior -->
        <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-sm shadow-lg">
            <div class="container mx-auto max-w-3xl p-4">
                <div class="flex gap-2">
                    <input type="text" 
                           id="input-message" 
                           class="input input-bordered w-full" 
                           placeholder="Digite sua pergunta...">
                    <button id="send-btn" 
                            class="btn btn-primary px-8">
                        Enviar
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/js/app.ts"></script>
</body>
</html>
